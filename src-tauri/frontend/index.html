<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Distillery</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f9f6f1;
      color: #6b6b6b;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0ddd8;
      border-top-color: #2d6a4f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Starting Distillery…</p>
  </div>
</body>
</html>
