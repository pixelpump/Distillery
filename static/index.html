<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distillery</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f9f6f1;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-faint: #9b9b9b;
      --accent: #2d6a4f;
      --accent-hover: #1b4332;
      --border: #e0ddd8;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 8px;
      --font-size: 18px;
    }

    [data-theme="dark"] {
      --bg: #141414;
      --surface: #1e1e1e;
      --text: #e8e4dc;
      --text-muted: #9b9b9b;
      --text-faint: #5a5a5a;
      --accent: #52b788;
      --accent-hover: #74c69d;
      --border: #2e2e2e;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 200;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Top Bar ── */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      transform: translateY(-100%);
      opacity: 0;
      transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    #topbar.visible {
      transform: translateY(0);
      opacity: 1;
    }

    #topbar .wordmark {
      font-size: 18px;
      font-weight: 200;
      letter-spacing: 2px;
      color: var(--accent);
      flex-shrink: 0;
      user-select: none;
    }

    #url-form {
      display: flex;
      flex: 1;
      gap: 8px;
      max-width: 680px;
    }

    #url-input {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    #url-input:focus { border-color: var(--accent); }
    #url-input::placeholder { color: var(--text-faint); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 200;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: #b1c9be;
      color: #1a1a1a;
    }
    .btn-primary:hover:not(:disabled) { background: #9fb8ac; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--border); color: var(--text); }

    .btn-icon {
      padding: 8px 10px;
    }

    .material-symbols-rounded {
      font-family: 'Material Symbols Rounded', sans-serif;
      font-weight: normal;
      font-style: normal;
      font-size: 20px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
    }

    .btn .material-symbols-rounded {
      font-size: 18px;
      vertical-align: middle;
    }

    .btn-arrow .material-symbols-rounded {
      transition: transform 0.2s ease;
      color: #f9f6f1;
    }

    .btn-arrow:hover .material-symbols-rounded {
      transform: translateX(3px);
    }

    #topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* font size control */
    #font-size-ctrl {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #font-size-ctrl span {
      font-size: 12px;
      color: var(--text-faint);
      min-width: 24px;
      text-align: center;
    }

    /* ── Main Layout ── */
    #main {
      max-width: 740px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      padding-top: 96px; /* Account for fixed header + spacing */
    }

    /* ── Home Screen ── */
    #home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 96px);
      text-align: center;
      gap: 16px;
    }

    #home-screen h1 {
      font-size: 36px;
      font-weight: 200;
      color: var(--accent);
      letter-spacing: 2px;
    }

    #home-screen p {
      color: var(--text-muted);
      font-size: 16px;
      max-width: 380px;
    }

    #home-url-form {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 540px;
      margin-top: 8px;
    }

    #home-url-input {
      flex: 1;
      padding: 12px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      box-shadow: var(--shadow);
    }
    #home-url-input:focus { border-color: var(--accent); }
    #home-url-input::placeholder { color: var(--text-faint); }

    /* ── Spinner ── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 80px 0;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ── Error Banner ── */
    #error-banner {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 24px;
    }
    [data-theme="dark"] #error-banner {
      background: #2d1515;
      border-color: #7f1d1d;
      color: #fca5a5;
    }

    /* ── Article View ── */
    #article-view { display: none; }

    .article-meta {
      margin-bottom: 32px;
    }

    .article-title {
      font-family: 'Montserrat', Georgia, serif;
      font-size: 30px;
      font-weight: 200;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 12px;
    }

    .article-byline {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .article-byline span { display: flex; align-items: center; gap: 4px; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    /* ── Action Buttons ── */
    #action-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    /* ── Summary Box ── */
    #summary-section {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
    }

    #summary-section h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      font-weight: 200;
      margin-bottom: 14px;
    }

    #summary-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }

    #summary-content .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 1px;
      animation: blink 0.9s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Audio Player ── */
    #audio-section {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
    }

    #audio-section h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      font-weight: 200;
      margin-bottom: 12px;
    }

    .audio-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    #play-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      transition: background 0.15s;
    }
    #play-btn:hover { background: var(--accent-hover); }

    .progress-wrap {
      flex: 1;
      min-width: 120px;
    }

    #progress-bar {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }
    #progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .time-label {
      font-size: 12px;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .speed-btns { display: flex; gap: 4px; }
    .speed-btn {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.1s;
    }
    .speed-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── TTS generating spinner ── */
    #tts-spinner {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text-muted);
    }
    #tts-spinner .spinner { width: 20px; height: 20px; border-width: 2px; }

    /* ── Article Body ── */
    #article-body {
      font-family: Georgia, "Times New Roman", serif;
      font-size: var(--font-size);
      line-height: 1.8;
      color: var(--text);
      max-width: 680px;
    }

    #article-body p {
      margin-bottom: 1.4em;
    }

    /* ── Theme Toggle ── */
    #theme-toggle {
      font-size: 18px;
      padding: 6px 10px;
      line-height: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      #topbar { padding: 0 12px; gap: 8px; }
      #url-form { display: none; }
      #main { padding: 80px 16px 60px; }
      .article-title { font-size: 24px; }
      #home-screen h1 { font-size: 28px; font-weight: 200; letter-spacing: -2px; }
      #home-screen { min-height: calc(100vh - 80px); }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<nav id="topbar">
  <span class="wordmark">Distillery</span>

  <form id="url-form" onsubmit="return false;">
    <input id="url-input" type="url" placeholder="Paste article URL…" autocomplete="off" />
    <button class="btn btn-primary btn-arrow" id="fetch-btn-top" type="submit"><span class="material-symbols-rounded">arrow_forward</span></button>
  </form>

  <div id="topbar-right">
    <div id="font-size-ctrl">
      <button class="btn btn-ghost btn-icon" id="font-dec" title="Smaller text"><span class="material-symbols-rounded">text_decrease</span></button>
      <span id="font-size-label">18</span>
      <button class="btn btn-ghost btn-icon" id="font-inc" title="Larger text"><span class="material-symbols-rounded">text_increase</span></button>
    </div>
    <button class="btn btn-ghost btn-icon" id="theme-toggle" title="Toggle dark mode"><span class="material-symbols-rounded">dark_mode</span></button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div id="main">

  <!-- HOME SCREEN -->
  <div id="home-screen">
    <img src="/static/distillerylogo2.png" alt="Distillery" style="width: 80px; height: 80px; margin-bottom: 16px;" />
    <h1>Distillery</h1>
    <p>Paste any article URL to get a clean, distraction-free reading experience.</p>
    <form id="home-url-form" onsubmit="return false;">
      <input id="home-url-input" type="url" placeholder="https://example.com/article" autocomplete="off" />
      <button class="btn btn-primary btn-arrow" id="fetch-btn-home" type="submit"><span class="material-symbols-rounded">arrow_forward</span></button>
    </form>
  </div>

  <!-- LOADING -->
  <div id="loading-view" style="display:none;">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span class="spinner-label">Fetching article…</span>
    </div>
  </div>

  <!-- ERROR -->
  <div id="error-banner"></div>

  <!-- ARTICLE -->
  <div id="article-view">

    <div class="article-meta">
      <h1 class="article-title" id="article-title"></h1>
      <div class="article-byline">
        <span id="byline-author"></span>
        <span id="byline-date"></span>
        <span id="byline-readtime"></span>
      </div>
    </div>

    <hr class="divider" />

    <!-- ACTIONS -->
    <div id="action-bar">
      <button class="btn btn-ghost" id="summarize-btn"><span class="material-symbols-rounded">auto_awesome</span> Summarize</button>
      <button class="btn btn-ghost" id="tts-btn"><span class="material-symbols-rounded">headphones</span> Listen</button>
    </div>

    <!-- SUMMARY -->
    <div id="summary-section">
      <h3>AI Summary</h3>
      <div id="summary-content"></div>
    </div>

    <!-- AUDIO -->
    <div id="audio-section">
      <h3>Article Audio</h3>
      <div id="tts-spinner">
        <div class="spinner"></div>
        <span>Generating audio…</span>
      </div>
      <div class="audio-controls" id="audio-controls" style="display:none;">
        <button id="play-btn" title="Play / Pause"><span class="material-symbols-rounded">play_arrow</span></button>
        <div class="progress-wrap">
          <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1" />
        </div>
        <span class="time-label" id="time-label">0:00 / 0:00</span>
        <div class="speed-btns">
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="1.5">1.5×</button>
          <button class="speed-btn" data-speed="2">2×</button>
        </div>
      </div>
    </div>

    <!-- BODY -->
    <div id="article-body"></div>

  </div>
</div>

<audio id="audio-el" preload="auto"></audio>

<script>
  // ── Scroll-based header visibility ─────────────────────────────────────────
  (function initScrollHeader() {
    const topbar = document.getElementById('topbar');
    let lastScrollY = window.scrollY;
    let ticking = false;

    function updateHeader() {
      const currentScrollY = window.scrollY;
      const scrollDelta = currentScrollY - lastScrollY;

      if (scrollDelta > 0) {
        // Scrolling down - hide
        topbar.classList.remove('visible');
      } else if (scrollDelta < 0) {
        // Scrolling up - show
        topbar.classList.add('visible');
      }

      lastScrollY = currentScrollY;
      ticking = false;
    }

    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(updateHeader);
        ticking = true;
      }
    }, { passive: true });
  })();

  // ── Debug logger ───────────────────────────────────────────────────────────
  function dbg(label, ...args) {
    console.log(`%c[Distillery] ${label}`, "color:#52b788;font-weight:bold", ...args);
  }
  function dbgWarn(label, ...args) {
    console.warn(`[Distillery] ${label}`, ...args);
  }
  function dbgError(label, ...args) {
    console.error(`[Distillery] ${label}`, ...args);
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let currentArticle = null;
  let currentUrlHash = null;
  let fontSize = 18;
  const MIN_FONT = 14, MAX_FONT = 28;

  dbg("Script loaded. DOM ready state:", document.readyState);

  // ── Theme ──────────────────────────────────────────────────────────────────
  const root = document.documentElement;
  const themeBtn = document.getElementById("theme-toggle");

  (function initTheme() {
    const saved = localStorage.getItem("distillery-theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    dbg("initTheme", { saved, prefersDark });
    if (saved === "dark" || (!saved && prefersDark)) setTheme("dark");
    else setTheme("light");
  })();

  function setTheme(t) {
    dbg("setTheme →", t);
    root.dataset.theme = t;
    themeBtn.innerHTML = t === "dark" ? '<span class="material-symbols-rounded">light_mode</span>' : '<span class="material-symbols-rounded">dark_mode</span>';
    localStorage.setItem("distillery-theme", t);
  }

  themeBtn.addEventListener("click", () => {
    setTheme(root.dataset.theme === "dark" ? "light" : "dark");
  });

  // ── Font Size ──────────────────────────────────────────────────────────────
  const fontLabel = document.getElementById("font-size-label");

  function applyFontSize() {
    root.style.setProperty("--font-size", fontSize + "px");
    fontLabel.textContent = fontSize;
  }

  document.getElementById("font-dec").addEventListener("click", () => {
    if (fontSize > MIN_FONT) { fontSize -= 2; applyFontSize(); }
  });
  document.getElementById("font-inc").addEventListener("click", () => {
    if (fontSize < MAX_FONT) { fontSize += 2; applyFontSize(); }
  });

  // ── URL hash helper ────────────────────────────────────────────────────────
  async function computeUrlHash(url) {
    const enc = new TextEncoder().encode(url);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2, "0"))
      .join("")
      .slice(0, 16);
  }

  // ── Fetch / Read ───────────────────────────────────────────────────────────
  function getUrl() {
    const top = document.getElementById("url-input").value.trim();
    const home = document.getElementById("home-url-input").value.trim();
    return top || home;
  }

  async function loadArticle(url) {
    if (!url) { dbgWarn("loadArticle called with empty URL"); return; }

    dbg("loadArticle start", url);
    showLoading();
    hideError();

    try {
      dbg("POST /fetch →", url);
      const res = await fetch("/fetch", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      dbg("POST /fetch response", { status: res.status, ok: res.ok, contentType: res.headers.get("content-type") });

      const data = await res.json();
      dbg("POST /fetch data", {
        title: data.title,
        author: data.author,
        date: data.date,
        word_count: data.word_count,
        text_length: data.text ? data.text.length : 0,
        text_preview: data.text ? data.text.slice(0, 120) : "(empty)",
        detail: data.detail,
      });

      if (!res.ok) throw new Error(data.detail || "Failed to fetch article.");

      currentArticle = data;
      currentUrlHash = await computeUrlHash(url);
      dbg("url hash computed", currentUrlHash);

      document.getElementById("url-input").value = url;
      document.getElementById("home-url-input").value = url;

      renderArticle(data);
    } catch (err) {
      dbgError("loadArticle error", err);
      showError(err.message);
      showHome();
    }
  }

  function renderArticle(data) {
    dbg("renderArticle start", { title: data.title, word_count: data.word_count });

    const titleEl = document.getElementById("article-title");
    titleEl.textContent = data.title;
    dbg("title set →", titleEl.textContent);

    const authorEl = document.getElementById("byline-author");
    authorEl.textContent = data.author ? "By " + data.author : "";
    authorEl.style.display = data.author ? "" : "none";
    dbg("author →", data.author);

    const dateEl = document.getElementById("byline-date");
    dateEl.textContent = data.date || "";
    dateEl.style.display = data.date ? "" : "none";
    dbg("date →", data.date);

    const readMins = Math.max(1, Math.round(data.word_count / 200));
    document.getElementById("byline-readtime").textContent =
      `${data.word_count.toLocaleString()} words · ${readMins} min read`;

    const bodyEl = document.getElementById("article-body");
    bodyEl.innerHTML = "";
    const paragraphs = data.text.split(/\n+/);
    dbg("paragraphs found", paragraphs.length);
    let rendered = 0;
    paragraphs.forEach(para => {
      if (!para.trim()) return;
      const p = document.createElement("p");
      p.textContent = para.trim().replace(/\s+/g, " ");
      bodyEl.appendChild(p);
      rendered++;
    });
    dbg("paragraphs rendered", rendered);

    resetSummary();
    resetAudio();

    dbg("calling showArticle()");
    showArticle();
    dbg("showArticle() done — #article-view display:", document.getElementById("article-view").style.display);
  }

  // ── View helpers ───────────────────────────────────────────────────────────
  function showHome() {
    dbg("showHome()");
    document.getElementById("home-screen").style.display = "flex";
    document.getElementById("loading-view").style.display = "none";
    document.getElementById("article-view").style.display = "none";
  }

  function showLoading() {
    dbg("showLoading()");
    document.getElementById("home-screen").style.display = "none";
    document.getElementById("loading-view").style.display = "block";
    document.getElementById("article-view").style.display = "none";
  }

  function showArticle() {
    dbg("showArticle() — setting #article-view to display:block");
    document.getElementById("home-screen").style.display = "none";
    document.getElementById("loading-view").style.display = "none";
    document.getElementById("article-view").style.display = "block";
    dbg("showArticle() — #article-view computed display:",
      getComputedStyle(document.getElementById("article-view")).display);
  }

  function showError(msg) {
    dbgError("showError:", msg);
    const el = document.getElementById("error-banner");
    el.textContent = "⚠ " + msg;
    el.style.display = "block";
  }

  function hideError() {
    document.getElementById("error-banner").style.display = "none";
  }

  // ── Form submit handlers ───────────────────────────────────────────────────
  document.getElementById("url-form").addEventListener("submit", () => {
    const url = document.getElementById("url-input").value.trim();
    dbg("url-form submit →", url);
    if (url) loadArticle(url);
  });

  document.getElementById("home-url-form").addEventListener("submit", () => {
    const url = document.getElementById("home-url-input").value.trim();
    dbg("home-url-form submit →", url);
    if (url) loadArticle(url);
  });


  dbg("All event listeners attached.");

  // ── Summary ────────────────────────────────────────────────────────────────
  function resetSummary() {
    const sec = document.getElementById("summary-section");
    sec.style.display = "none";
    document.getElementById("summary-content").textContent = "";
  }

  document.getElementById("summarize-btn").addEventListener("click", async () => {
    if (!currentArticle) return;

    const btn = document.getElementById("summarize-btn");
    const sec = document.getElementById("summary-section");
    const content = document.getElementById("summary-content");

    btn.disabled = true;
    btn.textContent = "Summarizing…";
    sec.style.display = "block";
    content.innerHTML = '<span class="cursor"></span>';

    try {
      dbg("POST /summarize →", currentArticle.text.length, "chars");
      const res = await fetch("/summarize", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: currentArticle.text }),
      });
      dbg("POST /summarize response", { status: res.status, ok: res.ok });

      if (!res.ok) throw new Error("Summary request failed.");

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let accumulated = "";

      content.innerHTML = "";
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      content.appendChild(cursor);

      let finished = false;
      while (!finished) {
        const { done, value } = await reader.read();
        if (done) { dbg("SSE stream done"); break; }

        const raw = decoder.decode(value, { stream: true });
        dbg("SSE chunk received", JSON.stringify(raw.slice(0, 120)));
        const lines = raw.split("\n");

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const payload = line.slice(6);
          if (payload === "[DONE]") {
            dbg("SSE [DONE] received, accumulated length:", accumulated.length);
            cursor.remove();
            finished = true;
            break;
          }
          if (payload.startsWith("[ERROR]")) {
            dbgError("SSE [ERROR]:", payload);
            cursor.remove();
            content.textContent = payload;
            finished = true;
            break;
          }
          accumulated += payload;
          content.textContent = accumulated;
          content.appendChild(cursor);
        }
      }
      dbg("Summary render complete. chars:", accumulated.length);
    } catch (err) {
      dbgError("summarize error", err);
      content.textContent = "Error: " + err.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-rounded">auto_awesome</span> Summarize';
    }
  });

  // ── TTS / Audio ────────────────────────────────────────────────────────────
  const audioEl = document.getElementById("audio-el");
  const playBtn = document.getElementById("play-btn");
  const progressBar = document.getElementById("progress-bar");
  const timeLabel = document.getElementById("time-label");

  function resetAudio() {
    const sec = document.getElementById("audio-section");
    sec.style.display = "none";
    document.getElementById("tts-spinner").style.display = "none";
    document.getElementById("audio-controls").style.display = "none";
    audioEl.pause();
    audioEl.src = "";
    playBtn.textContent = "▶";
    progressBar.value = 0;
    timeLabel.textContent = "0:00 / 0:00";
    document.querySelectorAll(".speed-btn").forEach((b, i) => {
      b.classList.toggle("active", i === 0);
    });
  }

  function formatTime(s) {
    if (isNaN(s) || !isFinite(s)) return "0:00";
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ":" + String(sec).padStart(2, "0");
  }

  document.getElementById("tts-btn").addEventListener("click", async () => {
    if (!currentArticle) return;

    const btn = document.getElementById("tts-btn");
    const sec = document.getElementById("audio-section");
    const spinner = document.getElementById("tts-spinner");
    const controls = document.getElementById("audio-controls");

    btn.disabled = true;
    btn.textContent = "Generating…";
    sec.style.display = "";
    spinner.style.display = "flex";
    controls.style.display = "none";

    try {
      const res = await fetch("/tts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          text: currentArticle.text,
          url_hash: currentUrlHash,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "TTS failed." }));
        throw new Error(err.detail || "TTS failed.");
      }

      const blob = await res.blob();
      const objUrl = URL.createObjectURL(blob);
      audioEl.src = objUrl;
      audioEl.load();

      spinner.style.display = "none";
      controls.style.display = "flex";
      audioEl.play();
      playBtn.innerHTML = '<span class="material-symbols-rounded">pause</span>';
    } catch (err) {
      spinner.style.display = "none";
      sec.style.display = "none";
      showError("TTS error: " + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-rounded">headphones</span> Listen';
    }
  });

  playBtn.addEventListener("click", () => {
    if (audioEl.paused) {
      audioEl.play();
      playBtn.innerHTML = '<span class="material-symbols-rounded">pause</span>';
    } else {
      audioEl.pause();
      playBtn.innerHTML = '<span class="material-symbols-rounded">play_arrow</span>';
    }
  });

  audioEl.addEventListener("timeupdate", () => {
    if (!audioEl.duration) return;
    const pct = (audioEl.currentTime / audioEl.duration) * 100;
    progressBar.value = pct;
    timeLabel.textContent = formatTime(audioEl.currentTime) + " / " + formatTime(audioEl.duration);
  });

  audioEl.addEventListener("ended", () => {
    playBtn.textContent = "▶";
    progressBar.value = 0;
  });

  progressBar.addEventListener("input", () => {
    if (!audioEl.duration) return;
    audioEl.currentTime = (progressBar.value / 100) * audioEl.duration;
  });

  document.querySelectorAll(".speed-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const speed = parseFloat(btn.dataset.speed);
      audioEl.playbackRate = speed;
      document.querySelectorAll(".speed-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });
</script>
</body>
</html>
